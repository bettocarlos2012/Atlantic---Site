```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlantic Audio</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, sans-serif;
      overflow:hidden;
      color:white;
      text-align:center;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
      linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.85)),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1920&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      filter:brightness(0.5);
      z-index:-1;
    }

    .container{
      max-width:700px;
      padding:40px;
      backdrop-filter: blur(10px);
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      box-shadow:0 0 40px rgba(0,0,0,.5);
    }

    h1{
      font-size:58px;
      margin-bottom:20px;
      letter-spacing:2px;
    }

    p{
      font-size:20px;
      color:#ccc;
      line-height:1.6;
    }

    .status{
      margin-top:30px;
      display:inline-block;
      padding:12px 24px;
      border-radius:50px;
      background:#ffffff10;
      border:1px solid #ffffff20;
      font-size:14px;
      letter-spacing:1px;
    }

    @media(max-width:768px){
      h1{
        font-size:38px;
      }

      p{
        font-size:16px;
      }

      .container{
        margin:20px;
        padding:30px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>ATLANTIC AUDIO</h1>

    <p>
      Nosso novo site está em construção.<br>
      Em breve uma experiência premium em áudio automotivo.
    </p>

    <div class="status">
      SITE EM CONSTRUÇÃO
    </div>
  </div>

</body>
</html>
